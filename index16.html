<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全台會考落點預測系統 (旗艦完整版)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --dream-color: #e67e22; 
            --ideal-color: #27ae60; 
            --safe-color: #2980b9;  
        }
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); color: var(--primary-color); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: var(--card-bg); padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #34495e; font-size: 1.8rem; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.95rem; color: #7f8c8d; margin-bottom: 20px; }
        
        .disclaimer { background-color: #fff3cd; border-left: 5px solid #ffc107; padding: 12px 20px; margin-bottom: 25px; border-radius: 5px; font-size: 0.9rem; color: #856404; line-height: 1.5; }
        .disclaimer strong { color: #d39e00; }

        .input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; max-width: 550px; margin-left: auto; margin-right: auto; }
        .subject-row { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 10px 20px; border-radius: 8px; border: 1px solid #e9ecef; }
        label { font-weight: bold; font-size: 1.05rem; color: #34495e; flex-shrink: 0; }
        
        select, input[type="text"] { padding: 8px 12px; border-radius: 8px; border: 1px solid #ced4da; font-size: 1rem; outline: none; width: 150px; text-align: center; }
        select:focus, input[type="text"]:focus { border-color: var(--accent-color); }
        input[type="text"] { width: 200px; text-align: left; }
        
        .btn-predict { width: 100%; max-width: 550px; display: block; margin: 0 auto; padding: 15px; background-color: var(--accent-color); color: white; border: none; border-radius: 10px; font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(231, 76, 60, 0.2); }
        .btn-predict:hover { background-color: #c0392b; transform: translateY(-2px); }
        
        .tab-container { display: flex; justify-content: center; gap: 10px; margin-top: 30px; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .tab-btn { background: #f8f9fa; border: 2px solid transparent; padding: 10px 25px; font-size: 1.1rem; font-weight: bold; color: #7f8c8d; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .tab-btn:hover { background: #e9ecef; }
        .tab-btn.active { background: #fff; color: var(--accent-color); border: 2px solid var(--accent-color); box-shadow: 0 4px 6px rgba(231, 76, 60, 0.1); }

        #results { margin-top: 20px; }
        .section-title { margin-top: 35px; margin-bottom: 15px; font-size: 1.3rem; padding-left: 10px; border-left: 6px solid; }
        .dream-title { color: var(--dream-color); border-color: var(--dream-color); }
        .ideal-title { color: var(--ideal-color); border-color: var(--ideal-color); }
        .safe-title { color: var(--safe-color); border-color: var(--safe-color); }
        
        /* 手機版表格滾動優化 (RWD) */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; background: white; min-width: 600px; }
        th, td { padding: 12px 10px; text-align: center; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #34495e; font-weight: bold; white-space: nowrap; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #fdfdfd; }
        .user-score-box { background: #eaf2f8; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; border: 1px solid #d4e6f1; }
    </style>
</head>

    // 各考區的錄取門檻判斷
    function isEligible(user, school, region) {
        if (region === 'taipei') {
            if (user.taipeiScore > school.parsed_score) return true;
            if (user.taipeiScore < school.parsed_score) return false;
        } else if (region === 'taichung') {
            if (user.score > school.tc_score) return true;
            if (user.score < school.tc_score) return false;
            if (user.tcDots > school.tc_dots) return true;
            if (user.tcDots < school.tc_dots) return false;
        } else if (region === 'taoyuan') {
            if (user.taoyuanScore > school.parsed_score) return true;
            if (user.taoyuanScore < school.parsed_score) return false;
            if (user.taoyuanDots > school.total_points) return true;
            if (user.taoyuanDots < school.total_points) return false;
        } else if (region === 'tainan') {
            if (user.score > school.parsed_score) return true;
            if (user.score < Math.floor(school.parsed_score)) return false;
        } else {
            if (user.score > school.parsed_score || user.score > school.score) return true;
            if (user.score < school.parsed_score || user.score < school.score) return false;
        }
        
        // 進入同分比序：依序比 A數 > A+數 > B數 > B+數 
        // 未來若需加入單科比序，可在此處運用 user.subjects (如 user.chi, user.mat...)
        if (user.a > school.a) return true;
        if (user.a < school.a) return false;
        if (user.aplus > school.aplus) return true;
        if (user.aplus < school.aplus) return false;
        if (user.b > school.b) return true;
        if (user.b < school.b) return false;
        if (user.bplus >= school.bplus) return true;
        return false;
    }

    function calculateResults() {
        const region = document.getElementById('region').value;
        const userGender = document.getElementById('gender').value;
        const deptFilter = document.getElementById('dept-filter').value;
        const searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
        
        // 基礎積分結構與單科成績(為了真正的比序做保留)
        let user = { 
            score: 0, taipeiScore: 0, tcDots: 0, taoyuanScore: 0, taoyuanDots: 0, 
            a: 0, aplus: 0, b: 0, bplus: 0,
            subjects: { chi: 0, eng: 0, mat: 0, sci: 0, soc: 0 } // 保留單科強度框架
        };

        const writingLevelStr = document.getElementById('writing').value;
        const taipeiWritingMap = { "6": 1, "5": 0.8, "4": 0.6, "3": 0.4, "2": 0.2, "1": 0.1, "0": 0 };
        
        if (region === 'taipei') user.taipeiScore += taipeiWritingMap[writingLevelStr];
        else if (region === 'taichung') user.tcDots += parseInt(writingLevelStr);

        const taipeiMap = { "6,2": 7, "6,1": 6, "6,0": 5, "4,2": 4, "4,1": 3, "4,0": 2, "2,0": 1 };
        const tcBaseMap = { 6: 15, 4: 6, 2: 3 };
        const taoyuanDotsMap = { "6,2": 7, "6,1": 6, "6,0": 5, "4,2": 4, "4,1": 3, "4,0": 2, "2,0": 1 };

        // 解析五科成績
        ['chi', 'eng', 'mat', 'sci', 'soc'].forEach(subject => {
            const valString = document.getElementById(subject).value;
            const [baseScore, plusCount] = valString.split(',').map(Number);
            
            user.subjects[subject] = baseScore; // 記錄單科
            user.score += baseScore; 
            user.taipeiScore += taipeiMap[valString]; 
            user.tcDots += tcBaseMap[baseScore] + (plusCount * 3); 
            user.taoyuanScore += baseScore; 
            user.taoyuanDots += taoyuanDotsMap[valString]; 

            if (baseScore === 6) { user.a += 1; user.aplus += plusCount; } 
            else if (baseScore === 4) { user.b += 1; user.bplus += plusCount; }
        });

        user.taipeiScore = Math.round(user.taipeiScore * 10) / 10; 

        // 選擇對應資料庫
        let activeData = [];
        if (region === 'taipei') activeData = (currentYear === '114') ? dataTaipei114 : dataTaipei113;
        else if (region === 'taichung') activeData = dataTaichung113; 
        else if (region === 'taoyuan') activeData = (currentYear === '114') ? dataTaoy114 : dataTaoy113;
        else if (region === 'tainan') activeData = dataTainan114; 
        else if (region === 'kaohsiung') activeData = (currentYear === '114') ? dataKao114 : dataKao113;
        else activeData = (currentYear === '114') ? data114 : data113;

        // 排序與多重條件篩選 (包含性別、科系偏好、關鍵字搜尋)
        const sortedSchools = activeData
            .filter(s => s.gender === 'all' || s.gender === userGender)
            .filter(s => {
                if (deptFilter === 'normal' && !s.department.includes('普通科')) return false;
                if (deptFilter === 'vocational' && s.department === '普通科') return false;
                return true;
            })
            .filter(s => {
                if (!searchKeyword) return true;
                return s.school.toLowerCase().includes(searchKeyword) || s.department.toLowerCase().includes(searchKeyword);
            })
            .sort((s1, s2) => {
                // 排序邏輯
                if (region === 'taipei') {
                    if (s2.parsed_score !== s1.parsed_score) return s2.parsed_score - s1.parsed_score;
                } else if (region === 'taichung') {
                    if (s2.tc_score !== s1.tc_score) return s2.tc_score - s1.tc_score;
                    if (s2.tc_dots !== s1.tc_dots) return s2.tc_dots - s1.tc_dots;
                } else if (region === 'taoyuan') {
                    if (s2.parsed_score !== s1.parsed_score) return s2.parsed_score - s1.parsed_score;
                    if (s2.total_points !== s1.total_points) return s2.total_points - s1.total_points;
                } else if (region === 'tainan') {
                    if (s2.parsed_score !== s1.parsed_score) return s2.parsed_score - s1.parsed_score;
                } else {
                    let score1 = s1.parsed_score || s1.score;
                    let score2 = s2.parsed_score || s2.score;
                    if (score2 !== score1) return score2 - score1;
                }
                
                // 次級比序
                if (s2.a !== s1.a) return s2.a - s1.a;
                if (s2.aplus !== s1.aplus) return s2.aplus - s1.aplus;
                if (s2.b !== s1.b) return s2.b - s1.b;
                return s2.bplus - s1.bplus;
            });

        // 找尋錄取門檻
        let firstEligibleIndex = -1;
        for (let i = 0; i < sortedSchools.length; i++) {
            if (isEligible(user, sortedSchools[i], region)) {
                firstEligibleIndex = i;
                break;
            }
        }

        let dream = [], ideal = [], safe = [];
        if (firstEligibleIndex === -1) {
            dream = sortedSchools.slice(-2);
        } else {
            const ineligible = sortedSchools.slice(0, firstEligibleIndex);
            const eligible = sortedSchools.slice(firstEligibleIndex);
            dream = ineligible.slice(-2);
            ideal = eligible.slice(0, 5);
            safe = eligible.slice(5);
        }

        displayResults(dream, ideal, safe, user, region);
    }

        if (schools.length === 0) return '<p style="text-align:center; color:#7f8c8d;">此區間目前無對應學校</p>';
        
        let scoreHeader = '積分';
        if (region === 'taichung' || region === 'taoyuan') scoreHeader = '積分\\積點';
        
        let html = `

                            <th>A數量</th>
                            <th>A的+數</th>
                            <th>B數量</th>
                            <th>B的+數</th>
                        </tr>
                    </thead>
                    <tbody>
        `;
        schools.forEach(s => {

            if (region === 'taoyuan') displayScore = `${s.score}分 / ${s.total_points}點`;

            html += `

                    <td>${s.b}</td>
                    <td>${s.bplus}</td>
                </tr>
            `;
        });
        html += `</tbody></table></div>`;
        return html;
    }

        else if (region === 'taoyuan') scoreHTML = `<span style="color:#e74c3c; font-weight:bold;">積分 ${user.taoyuanScore} 分 / 積點 ${user.taoyuanDots} 點</span>`;

                <strong>您的成績統計：</strong> ${scoreHTML} / ${user.a}A / ${user.aplus}+ / ${user.b}B / ${user.bplus}+
                <div style="font-size:0.85rem; color:#7f8c8d; margin-top:5px;">目前顯示資料：${regionText} ${currentYear}年</div>
            </div>
        `;

        html += `<h2 class="section-title dream-title">🌟 夢幻志願 <span style="font-size:0.9rem; color:#7f8c8d; font-weight:normal;">(比考生成績高，可填寫拚運氣)</span></h2>`;
        html += generateTableHTML(dream, region);

        html += `<h2 class="section-title ideal-title">🎯 理想志願 <span style="font-size:0.9rem; color:#7f8c8d; font-weight:normal;">(符合且最接近考生成績)</span></h2>`;
        html += generateTableHTML(ideal, region);

        html += `<h2 class="section-title safe-title">🛡️ 保底志願 <span style="font-size:0.9rem; color:#7f8c8d; font-weight:normal;">(比考生成績低，非常安全)</span></h2>`;
        html += generateTableHTML(safe, region);

        resultsDiv.innerHTML = html;
    }
</script>

</body>
</html>
